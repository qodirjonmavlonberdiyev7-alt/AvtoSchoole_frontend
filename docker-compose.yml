services:
  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: avtoschoole-frontend:latest
    container_name: avtoschoole-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - avtoschoole-net

networks:
  # Created once on the VPS with `docker network create avtoschoole-net` (see DEPLOYMENT.md) -
  # shared with the sibling backend stack so nginx can reach it by service name "backend".
  avtoschoole-net:
    external: true
